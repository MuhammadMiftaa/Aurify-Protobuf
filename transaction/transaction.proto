syntax = "proto3";

package transaction;

option go_package = "github.com/MuhammadMiftaa/Refina-Protobuf/transaction";

service TransactionService {
    // ── Transaction RPCs ──
    rpc GetTransactions (GetTransactionOptions) returns (stream Transaction);
    rpc GetUserTransactions (GetUserTransactionsRequest) returns (GetUserTransactionsResponse);
    rpc GetTransactionByID (TransactionID) returns (TransactionDetail);
    rpc CreateTransaction (CreateTransactionRequest) returns (TransactionDetail);
    rpc CreateFundTransfer (CreateFundTransferRequest) returns (FundTransferResponse);
    rpc UpdateTransaction (UpdateTransactionRequest) returns (TransactionDetail);
    rpc DeleteTransaction (TransactionID) returns (TransactionDetail);

    // ── Category RPCs ──
    rpc GetCategories (GetCategoriesRequest) returns (GetCategoriesResponse);

    // ── Admin Master Data RPCs ──
    rpc ListCategories (ListCategoriesRequest) returns (ListCategoriesResponse);
    rpc GetCategoryDetail (CategoryID) returns (CategoryDetail);

    // ── Attachment RPCs ──
    rpc GetAttachmentsByTransactionID (TransactionID) returns (GetAttachmentsResponse);
    rpc CreateAttachment (CreateAttachmentRequest) returns (Attachment);
    rpc DeleteAttachment (AttachmentID) returns (Attachment);

    // ── Budget RPCs ──
    rpc GetBudgets (GetBudgetsRequest) returns (GetBudgetsResponse);
    rpc CreateBudget (CreateBudgetRequest) returns (Budget);
    rpc UpdateBudget (UpdateBudgetRequest) returns (Budget);
    rpc DeleteBudget (BudgetID) returns (Budget);
    rpc ResetBudget (BudgetID) returns (Budget);
}

// ── Base Messages ──

message Empty {}

message Transaction {
    string id = 1;
    string user_id = 2;
    string wallet_id = 3;
    double amount = 4;
    string category_id = 5;
    string category_name = 6;
    string category_type = 7;
    string transaction_date = 8;
    string description = 9;
    string created_at = 10;
    string updated_at = 11;
    string wallet_name = 12;
}

message Attachment {
    string id = 1;
    string transaction_id = 2;
    string image = 3;
    string format = 4;
    int64 size = 5;
    string created_at = 6;
    string updated_at = 7;
}

message TransactionDetail {
    string id = 1;
    string wallet_id = 2;
    string category_id = 3;
    string category_name = 4;
    string category_type = 5;
    double amount = 6;
    string transaction_date = 7;
    string description = 8;
    string created_at = 9;
    string updated_at = 10;
    string wallet_name = 11;
    repeated Attachment attachments = 12;
}

message CategoryGroup {
    string group_name = 1;
    string type = 2;
    repeated CategoryItem categories = 3;
}

message CategoryItem {
    string id = 1;
    string name = 2;
}

// ── Request Messages ──

message TransactionID {
    string id = 1;
}

message AttachmentID {
    string id = 1;
}

message UserID {
    string id = 1;
}

message Wallets {
    repeated string wallet_id = 1;
}

message GetTransactionOptions {
    int32 limit = 1;
}

message GetUserTransactionsRequest {
    repeated string wallet_ids = 1;
    int32 page_size = 2;
    string sort_by = 3;
    string sort_order = 4;
    string search = 5;
    string wallet_id = 6;
    string category_id = 7;
    string category_type = 8;
    string date_from = 9;
    string date_to = 10;
    string cursor = 11;         // keyset cursor (last item ID from previous page)
    double cursor_amount = 12;  // cursor sort value when sorting by amount
    string cursor_date = 13;    // cursor sort value when sorting by date
}

message CreateTransactionRequest {
    string user_id = 1;
    string wallet_id = 2;
    string category_id = 3;
    double amount = 4;
    string transaction_date = 5;
    string description = 6;
    repeated string attachments = 7;
    bool is_wallet_not_created = 8;
}

message CreateFundTransferRequest {
    string user_id = 1;
    string from_wallet_id = 2;
    string to_wallet_id = 3;
    double amount = 4;
    double admin_fee = 5;
    string cash_out_category_id = 6;
    string cash_in_category_id = 7;
    string transaction_date = 8;
    string description = 9;
}

message UpdateTransactionRequest {
    string id = 1;
    string wallet_id = 2;
    string category_id = 3;
    double amount = 4;
    string transaction_date = 5;
    string description = 6;
    repeated UpdateAttachmentAction attachment_actions = 7;
}

message UpdateAttachmentAction {
    string status = 1;
    repeated string files = 2;
}

message GetCategoriesRequest {
    string type = 1;
}

message CreateAttachmentRequest {
    string transaction_id = 1;
    string image = 2;
    string format = 3;
    int64 size = 4;
}

// ── Response Messages ──

message GetUserTransactionsResponse {
    repeated TransactionDetail transactions = 1;
    int32 total = 2;
    int32 page_size = 3;
    string next_cursor = 4;       // ID of the last item (use as cursor for next page)
    bool has_next = 5;            // whether there are more items
    double next_cursor_amount = 6;
    string next_cursor_date = 7;
}

message GetCategoriesResponse {
    repeated CategoryGroup categories = 1;
}

message GetAttachmentsResponse {
    repeated Attachment attachments = 1;
}

message FundTransferResponse {
    string cash_out_transaction_id = 1;
    string cash_in_transaction_id = 2;
    string from_wallet_id = 3;
    string to_wallet_id = 4;
    double amount = 5;
    string date = 6;
    string description = 7;
}

message NewTransaction {
    string wallet_id = 1;
    double amount = 2;
    string category_id = 3;
    string transaction_date = 4;
    string description = 5;
}

// ── Admin Master Data Messages ──

message CategoryID {
    string id = 1;
}

message CategoryDetail {
    string id = 1;
    string parent_id = 2;
    string parent_name = 3;
    string name = 4;
    string type = 5;
    string created_at = 6;
    string updated_at = 7;
}

message ListCategoriesRequest {
    int32 page = 1;
    int32 page_size = 2;
    string sort_by = 3;
    string sort_order = 4;
    string search = 5;
    string type = 6;
}

message ListCategoriesResponse {
    repeated CategoryDetail categories = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
    int32 total_pages = 5;
}

// ── Budget Messages ──

message Budget {
    string id = 1;
    string user_id = 2;
    string scope = 3;                 // "overall" or "category"
    string category_id = 4;           // nullable, only for category scope
    string category_name = 5;         // populated from join
    string wallet_scope = 6;          // "all" or wallet_id
    string wallet_id = 7;             // nullable
    string wallet_name = 8;           // populated from external service
    double monthly_limit = 9;
    double current_spent = 10;        // calculated from transactions
    string period = 11;               // format: "YYYY-MM"
    int32 streak_count = 12;
    bool streak_active = 13;
    string created_at = 14;
    string updated_at = 15;
}

message BudgetID {
    string id = 1;
}

message GetBudgetsRequest {
    string period = 1;                // format: "YYYY-MM"
}

message GetBudgetsResponse {
    repeated Budget budgets = 1;
}

message CreateBudgetRequest {
    string scope = 1;                 // "overall" or "category"
    string category_id = 2;           // optional, required if scope = "category"
    string wallet_id = 3;             // optional, null = all wallets
    double monthly_limit = 4;
    string period = 5;                // format: "YYYY-MM"
}

message UpdateBudgetRequest {
    string id = 1;
    double monthly_limit = 2;
}